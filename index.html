<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherIQ Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-animation"></div>

    <div class="container">

        <header>
            <div class="logo">
                <i class="fa-solid fa-cloud-sun"></i>
                <h1>WeatherIQ</h1>
            </div>
            <div class="header-actions">
                <button id="themeToggle">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </header>

        <section class="search-section">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Search any city...">
                <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
                <button id="locationBtn"><i class="fa-solid fa-location-crosshairs"></i></button>
            </div>
            <div id="searchHistory" class="search-history"></div>
        </section>

        <section class="current-weather">
            <div class="main-weather-card">
                <div class="weather-top">
                    <div>
                        <h2 id="cityName">Search a city</h2>
                        <p id="currentDate">--</p>
                    </div>
                    <div class="weather-icon">☀️</div>
                </div>
                <div class="temperature">
                    <h1 id="temp">--°C</h1>
                </div>
                <div class="condition">
                    <span id="weatherCondition">Weather Condition</span>
                </div>
            </div>
        </section>

        <section class="metrics-grid">
            <div class="metric-card">
                <i class="fa-solid fa-temperature-half"></i>
                <h3>Feels Like</h3>
                <p id="feelsLike">--°C</p>
            </div>
            <div class="metric-card">
                <i class="fa-solid fa-droplet"></i>
                <h3>Humidity</h3>
                <p id="humidity">--%</p>
            </div>
            <div class="metric-card">
                <i class="fa-solid fa-wind"></i>
                <h3>Wind Speed</h3>
                <p id="wind">-- km/h</p>
            </div>
            <div class="metric-card">
                <i class="fa-solid fa-gauge-high"></i>
                <h3>Pressure</h3>
                <p id="pressure">-- hPa</p>
            </div>
            <div class="metric-card">
                <i class="fa-solid fa-eye"></i>
                <h3>Visibility</h3>
                <p id="visibility">-- km</p>
            </div>
            <div class="metric-card">
                <i class="fa-solid fa-sun"></i>
                <h3>UV Index</h3>
                <p id="uvIndex">--</p>
            </div>
        </section>

        <section class="aqi-section">
            <h2>Air Quality Index</h2>
            <div class="aqi-card">
                <div class="aqi-value"><span id="aqiValue">--</span></div>
                <div class="aqi-status"><span id="aqiStatus">Unknown</span></div>
            </div>
        </section>

        <section class="forecast-section">
            <h2>7 Day Forecast</h2>
            <div id="forecastContainer" class="forecast-container"></div>
        </section>

        <section class="chart-section">
            <h2>Temperature Trend</h2>
            <canvas id="tempChart"></canvas>
        </section>

        <section class="map-section">
            <h2>Weather Location</h2>
            <div id="map"></div>
        </section>

    </div>

    <div id="loader" class="loader hidden">
        <div class="spinner"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
